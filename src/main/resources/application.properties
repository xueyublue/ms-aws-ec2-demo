spring.application.name=todo

server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/todo}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

app.sqs.enabled=${APP_SQS_ENABLED:false}
app.sqs.region=${APP_SQS_REGION:${AWS_REGION:ap-southeast-1}}
app.sqs.todo-created-queue-url=${APP_SQS_TODO_CREATED_QUEUE_URL:}
app.sqs.consumer.enabled=${APP_SQS_CONSUMER_ENABLED:false}
app.sqs.consumer.queue-url=${APP_SQS_CONSUMER_QUEUE_URL:${APP_SQS_TODO_CREATED_QUEUE_URL:}}
app.sqs.consumer.poll-delay-ms=${APP_SQS_CONSUMER_POLL_DELAY_MS:5000}
app.sqs.consumer.max-messages=${APP_SQS_CONSUMER_MAX_MESSAGES:10}
app.sqs.consumer.wait-time-seconds=${APP_SQS_CONSUMER_WAIT_TIME_SECONDS:10}
