name: Build and Deploy to EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_HEALTHCHECK_PATH: ${{ secrets.APP_HEALTHCHECK_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and test
        run: mvn -B clean test package

      - name: Resolve artifact path
        id: artifact
        run: |
          JAR_FILE=$(ls target/*.jar | head -n 1)
          echo "jar_file=$JAR_FILE" >> "$GITHUB_OUTPUT"
          echo "release_name=app-$(date +%Y%m%d%H%M%S).jar" >> "$GITHUB_OUTPUT"

      - name: Validate required secrets
        run: |
          [ -n "${{ secrets.EC2_HOST }}" ] || { echo "Missing required secret: EC2_HOST"; exit 1; }
          [ -n "${{ secrets.EC2_USER }}" ] || { echo "Missing required secret: EC2_USER"; exit 1; }
          [ -n "${{ secrets.EC2_SSH_KEY }}" ] || { echo "Missing required secret: EC2_SSH_KEY"; exit 1; }
          [ -n "${{ secrets.EC2_APP_DIR }}" ] || { echo "Missing required secret: EC2_APP_DIR"; exit 1; }

      - name: Setup SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          # Normalize copied secrets (especially keys pasted from Windows)
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Validate private key format early so failures are explicit in this step.
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null

          EC2_HOST_ONLY="${{ secrets.EC2_HOST }}"
          EC2_HOST_ONLY="${EC2_HOST_ONLY#*@}"
          touch ~/.ssh/known_hosts
          # Best effort host key prefetch. SSH still allows first connect via accept-new.
          ssh-keyscan -T 15 -H "$EC2_HOST_ONLY" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload release jar
        run: |
          EC2_HOST_ONLY="${{ secrets.EC2_HOST }}"
          EC2_HOST_ONLY="${EC2_HOST_ONLY#*@}"
          scp -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts -i ~/.ssh/id_ed25519 "${{ steps.artifact.outputs.jar_file }}" \
            "${{ secrets.EC2_USER }}@$EC2_HOST_ONLY:${{ secrets.EC2_APP_DIR }}/releases/${{ steps.artifact.outputs.release_name }}"

      - name: Switch symlink and restart service
        run: |
          EC2_HOST_ONLY="${{ secrets.EC2_HOST }}"
          EC2_HOST_ONLY="${EC2_HOST_ONLY#*@}"
          ssh -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts -i ~/.ssh/id_ed25519 "${{ secrets.EC2_USER }}@$EC2_HOST_ONLY" "
            ln -sfn '${{ secrets.EC2_APP_DIR }}/releases/${{ steps.artifact.outputs.release_name }}' '${{ secrets.EC2_APP_DIR }}/current/app.jar' &&
            sudo systemctl restart todo &&
            sudo systemctl is-active --quiet todo
          "

      - name: Optional health check (on EC2 localhost)
        if: ${{ env.APP_HEALTHCHECK_PATH != '' }}
        run: |
          EC2_HOST_ONLY="${{ secrets.EC2_HOST }}"
          EC2_HOST_ONLY="${EC2_HOST_ONLY#*@}"
          ssh -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts -i ~/.ssh/id_ed25519 "${{ secrets.EC2_USER }}@$EC2_HOST_ONLY" \
            "curl --fail --retry 10 --retry-delay 3 http://127.0.0.1:8080$APP_HEALTHCHECK_PATH"